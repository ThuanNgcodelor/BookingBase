version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: booking_db
    restart: always
    command:
      - --innodb-buffer-pool-size=128M
      - --max-connections=30
      - --performance-schema=OFF
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: booking_db
      MYSQL_USER: booking_user
      MYSQL_PASSWORD: Thuan@417
    ports:
      - "3306:3306"
    deploy:
      resources:
        limits:
          memory: 400M
    volumes:
      - db_data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    container_name: booking_redis
    restart: always
    command: redis-server --appendonly yes --maxmemory 64mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    deploy:
      resources:
        limits:
          memory: 150M
    volumes:
      - redis_data:/data

  adminer:
    image: adminer
    container_name: booking_adminer
    restart: always
    ports:
      - "8081:8080"
    deploy:
      resources:
        limits:
          memory: 100M
    depends_on:
      - db

volumes:
  db_data:
  redis_data:
